<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RollShelf</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@800&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f141a;
      --panel: rgba(18, 24, 33, 0.86);
      --panel-solid: #141a22;
      --text: #eef3fb;
      --muted: #99a7bb;
      --accent: #4BAAE5;
      --accent-strong: #6ec4f5;
      --border: #2d3a49;
      --button-bg: linear-gradient(180deg, #1b2430, #151c26);
      --search-bg: #111823;
      --preview-bg: #0d1218;
      --sidebar-width: 290px;
      --tile-width: 39px;
      --tile-height: calc(var(--tile-width) * 1.5);
      --content-media-width: 78px;
      --content-media-height: calc(var(--content-media-width) * 1.5);
      --overlay-height: 38px;
      --tile-font-size: 9.1px;
      --grid-gap: calc(var(--tile-width) * 0.18);
      --transition: 180ms ease;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.26);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: radial-gradient(circle at top left, #162131 0%, var(--bg) 42%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none; -webkit-user-select: none;
    }

    button, input, select { font: inherit; }
    input, textarea { user-select: text; -webkit-user-select: text; }

    .app {
      width: 100%; height: 100%;
      display: grid; grid-template-columns: var(--sidebar-width) 1fr;
      transition: grid-template-columns var(--transition);
    }
    .app.sidebar-collapsed { grid-template-columns: 0 1fr; }

    .sidebar {
      min-width: 0;
      background: linear-gradient(180deg, rgba(18, 24, 33, 0.98), rgba(14, 19, 27, 0.98));
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .main { min-width: 0; min-height: 0; display: grid; grid-template-rows: auto 1fr; }

    .topbar, .sidebar-header {
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px); background: var(--panel);
    }

    .topbar {
      display: flex; align-items: stretch; padding: 0; flex-wrap: nowrap;
      height: 48px; min-height: 48px; flex-shrink: 0; overflow: hidden;
    }

    .brand { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; padding: 0 6px 0 10px; }

    .toolbar-wrap {
      flex: 1 1 0; min-width: 0; height: 100%; position: relative; overflow: hidden;
    }
    .toolbar-wrap::before, .toolbar-wrap::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 18px; z-index: 2;
      pointer-events: none; transition: opacity 160ms ease;
    }
    .toolbar-wrap::before { left: 0; background: linear-gradient(to right, var(--panel-solid), transparent); }
    .toolbar-wrap::after { right: 0; background: linear-gradient(to left, var(--panel-solid), transparent); }
    .toolbar-wrap.at-start::before { opacity: 0; }
    .toolbar-wrap.at-end::after { opacity: 0; }

    .toolbar {
      display: flex; align-items: center; gap: 4px; height: 100%;
      overflow-x: auto; overflow-y: hidden; flex-wrap: nowrap;
      scrollbar-width: none; -ms-overflow-style: none; padding: 0 6px;
      -webkit-overflow-scrolling: touch; touch-action: pan-x; cursor: grab;
    }
    .toolbar.dragging { cursor: grabbing; }
    .toolbar.dragging > * { pointer-events: none; }
    .toolbar::-webkit-scrollbar { display: none; }
    .toolbar > * { flex-shrink: 0; }

    .toolbar-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 4px; }
    .toolbar-search { flex: 0 0 auto; width: clamp(120px, 22vw, 220px); position: relative; }

    .brand-title {
      font-size: 18px; font-weight: 800; letter-spacing: .04em; white-space: nowrap;
      font-family: 'Exo 2', 'Rajdhani', 'Bebas Neue', system-ui, sans-serif;
      color: var(--accent) !important;
    }

    .topbar, .topbar input, .topbar button { font-size: 12px; }

    .search-wrap { position: relative; width: 100%; }
    .search-input, .config-input, .config-select {
      width: 100%; border: 1px solid var(--border); border-radius: 12px;
      background: var(--search-bg); color: var(--text); outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-input { padding: 7px 11px 7px 32px; }
    .config-input, .config-select { padding: 7px 10px; }
    .search-input:focus, .config-input:focus, .config-select:focus {
      border-color: rgba(75, 170, 229, .78);
      box-shadow: 0 0 0 3px rgba(75, 170, 229, .14);
    }

    .search-icon {
      position: absolute; top: 50%; left: 10px; width: 14px; height: 14px;
      color: var(--muted); transform: translateY(-50%); pointer-events: none;
    }

    .tree-toggle { width: 16px; flex: 0 0 16px; text-align: center; color: var(--muted); }
    .tree-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: var(--text); }

    .icon-button, .modal-button, .viewer-button {
      appearance: none; border: 1px solid var(--border); background: var(--button-bg);
      color: var(--text); border-radius: 12px; min-width: 34px; min-height: 32px;
      padding: 6px 8px; display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,.16);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), background var(--transition);
      white-space: nowrap;
    }
    .icon-button:hover, .modal-button:hover, .viewer-button:hover, .crumb:hover, .tree-row:hover {
      transform: translateY(-1px); border-color: rgba(75, 170, 229, .75);
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }
    .icon-button.active, .viewer-button.active {
      background: linear-gradient(180deg, rgba(75, 170, 229, .30), rgba(75, 170, 229, .16));
      border-color: rgba(75, 170, 229, .75);
    }
    .icon-button svg, .search-icon { width: 15px; height: 15px; display: block; }
    .icon-button:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .icon-button.sort-date { background: linear-gradient(180deg, rgba(75,170,229,.28), rgba(75,170,229,.14)); border-color: rgba(75,170,229,.75); }

    .status { display: none; }
    .sidebar-header { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .sidebar-title { font-size: 12px; font-weight: 700; letter-spacing: .2px; color: var(--text); }
    .brand-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .sidebar-scroll, .content-scroll {
      min-width: 0; min-height: 0; overflow: auto; overscroll-behavior: contain;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .sidebar-scroll::-webkit-scrollbar, .content-scroll::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .sidebar-scroll { padding: 8px 8px 18px; }

    .tree-node { user-select: none; }
    .tree-row {
      display: flex; align-items: center; gap: 6px; padding: 6px 7px;
      border-radius: 10px; border: 1px solid transparent; color: var(--text); cursor: pointer;
      transition: background var(--transition), transform var(--transition), border-color var(--transition);
    }
    .tree-row:hover { background: rgba(75, 170, 229, .08); transform: translateX(1px); }
    .tree-row.active { background: rgba(75, 170, 229, .16); border-color: rgba(75, 170, 229, .20); }
    .tree-children { display: none; margin-left: 18px; padding-left: 6px; border-left: 1px dashed rgba(255,255,255,0.08); }
    .tree-children.open { display: block; }

    .content-scroll { padding: 10px 12px; position: relative; cursor: grab; touch-action: none; overflow: hidden !important; }
    .content-scroll.dragging { cursor: grabbing; }

    .scroll-overlay { display: none !important; }

    .breadcrumbs { display: none; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .crumb {
      appearance: none; border: 1px solid var(--border); background: rgba(255,255,255,0.03);
      color: var(--text); border-radius: 999px; padding: 7px 12px; cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), background var(--transition), box-shadow var(--transition);
    }

    .grid { display: grid; gap: var(--grid-gap); align-content: start; width: max-content; min-width: 100%; will-change: transform; }
    .grid.horizontal { grid-auto-flow: column; grid-auto-columns: var(--tile-width); grid-template-rows: repeat(auto-fill, minmax(var(--tile-height), var(--tile-height))); min-height: calc(100% - 44px); }
    .grid.vertical { grid-template-columns: repeat(auto-fill, minmax(var(--tile-width), var(--tile-width))); width: 100%; min-height: 0; }

    .tile {
      width: var(--tile-width); height: var(--tile-height); border-radius: 0;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
      overflow: hidden; position: relative; cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), background var(--transition);
      box-shadow: var(--shadow); isolation: isolate;
    }
    .tile:hover {
      transform: translateY(-3px) scale(1.02); border-color: rgba(75, 170, 229, .74);
      background: linear-gradient(180deg, rgba(75, 170, 229, .09), rgba(255,255,255,0.02));
      box-shadow: 0 20px 38px rgba(0, 0, 0, .32); z-index: 2;
    }

    .tile-media { position: absolute; inset: 0; background: var(--preview-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .tile-media img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform 220ms ease, filter 220ms ease; pointer-events: none; flex: 0 0 auto; }
    .tile:hover .tile-media img { transform: scale(1.03); filter: brightness(1.04) saturate(1.03); }

    .tile-fallback {
      width: 100%; height: 100%; display: grid; place-items: center; color: var(--text);
      background: radial-gradient(circle at 30% 20%, rgba(75, 170, 229, 0.14), transparent 32%), linear-gradient(180deg, #131a23, #0e131a 60%);
      pointer-events: none;
    }
    .tile-folder-icon, .tile-file-icon { width: 38%; height: 38%; opacity: .95; }
    .tile-folder-icon { color: #f6ce5d; }
    .tile-file-icon { color: var(--accent); }

    .tile-name-overlay {
      position: absolute; left: 0; right: 0; bottom: 0; min-height: var(--overlay-height);
      padding: 5px 6px 5px;
      background: linear-gradient(180deg, rgba(7,10,14,0) 0%, rgba(7,10,14,.50) 24%, rgba(7,10,14,.90) 100%);
      display: flex; align-items: flex-end; z-index: 2; pointer-events: none;
    }
    .tile-name {
      font-size: var(--tile-font-size); font-weight: 600; line-height: 1.22;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3;
      overflow: hidden; word-break: break-word;
    }

    .empty { padding: 22px; border-radius: 0; border: 1px dashed var(--border); color: var(--muted); background: rgba(255,255,255,0.02); width: min(520px, 100%); }
    .hidden { display: none !important; }

    .modal-backdrop { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(3, 7, 12, 0.56); backdrop-filter: blur(8px); z-index: 40; }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(560px, 100%); border-radius: 20px; background: linear-gradient(180deg, #171f2a, #121922); border: 1px solid var(--border); box-shadow: 0 28px 60px rgba(0,0,0,0.38); overflow: hidden; }
    .modal-header, .modal-footer { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); }
    .modal-footer { border-bottom: 0; border-top: 1px solid var(--border); justify-content: flex-end; }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .modal-body { padding: 16px; display: grid; gap: 16px; }
    .config-group { display: grid; gap: 8px; }
    .config-label, .config-help { font-size: 12px; color: var(--muted); line-height: 1.45; }
    .note { font-size: 12px; color: var(--muted); padding: 6px 8px; }
    .viewer-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .brand-link { display: flex; align-items: center; gap: 6px; text-decoration: none; cursor: pointer; border-radius: 8px; padding: 2px 4px; transition: opacity 160ms ease; }
    .brand-link:hover { opacity: 0.75; }
    .brand-icon { font-size: 16px; color: var(--accent); line-height: 1; flex-shrink: 0; }
    .source-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(75, 170, 229, 0.15); border: 1px solid rgba(75, 170, 229, 0.35); color: var(--accent); white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .zoom-label { font-size: 11px; font-family: 'DM Mono', 'Courier New', monospace; color: var(--muted); white-space: nowrap; min-width: 36px; text-align: center; flex-shrink: 0; user-select: none; }
  </style>
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Folder Tree</div>
        <button id="collapseSidebarButton" class="icon-button" type="button" title="Hide tree" aria-label="Hide tree">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
        </button>
      </div>
      <div class="sidebar-scroll"><div id="treeRoot"></div></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="toolbar-wrap at-start" id="toolbarWrap">
          <div class="toolbar" id="toolbar">
            <div class="brand">
              <button id="showSidebarButton" class="icon-button hidden" type="button" title="Show tree" aria-label="Show tree">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
              </button>
              <a href="https://github.com/covao/RollShelf" target="_blank" rel="noopener" class="brand-link" title="RollShelf on GitHub">
                <span class="brand-icon">📚</span>
                <div class="brand-title">RollShelf</div>
              </a>
              <div id="brandCount" class="brand-count"></div>
              <div id="sourceBadge" class="source-badge hidden"></div>
            </div>
            <div class="toolbar-divider"></div>
            <button id="goUpButton" class="icon-button" type="button" title="Go up one level" aria-label="Go up one level" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
            </button>
            <button id="zoomOutButton" class="icon-button" type="button" title="Smaller grid" aria-label="Smaller grid">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
            </button>
            <span id="zoomLabel" class="zoom-label">100%</span>
            <button id="zoomInButton" class="icon-button" type="button" title="Larger grid" aria-label="Larger grid">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
            <button id="sortButton" class="icon-button" type="button" title="Sort: Name A→Z — click for Date" aria-label="Toggle sort order">
              <svg id="sortIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></svg>
            </button>
            <button id="scrollModeButton" class="icon-button" type="button" title="Toggle scroll mode" aria-label="Toggle scroll mode">
              <svg id="scrollModeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16"/><path d="m14 6 6 6-6 6"/><path d="m10 6-6 6 6 6"/></svg>
            </button>
            <button id="fullscreenButton" class="icon-button" type="button" title="Toggle full screen" aria-label="Toggle full screen">
              <svg id="fullscreenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
            </button>
            <button id="configButton" class="icon-button" type="button" title="Configuration" aria-label="Configuration">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <div class="toolbar-search">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
              <input id="searchInput" class="search-input" type="text" placeholder="Filter…" spellcheck="false" />
            </div>
          </div>
        </div>
      </div>
      <div id="contentScroll" class="content-scroll">
        <div id="breadcrumbs" class="breadcrumbs"></div>
        <div id="grid" class="grid horizontal"></div>
      </div>
    </main>
  </div>

  <div id="configModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="configTitle">
      <div class="modal-header">
        <div id="configTitle" class="modal-title">Configuration</div>
        <button id="closeConfigButton" class="icon-button" type="button" aria-label="Close configuration">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="config-group">
          <div class="config-label">PDF Viewer Mode</div>
          <div class="viewer-row">
            <button id="viewerDefaultButton" class="viewer-button" type="button">Default</button>
            <button id="viewerUserButton" class="viewer-button" type="button">User Viewer</button>
          </div>
        </div>
        <div class="config-group">
          <label class="config-label" for="viewerUrlInput">User Viewer HTML URL (PDF only)</label>
          <input id="viewerUrlInput" class="config-input" type="text" spellcheck="false" />
          <div class="config-help">Use <code>{url}</code> to insert the PDF file URL. When omitted, <code>?url=...</code> is appended automatically.</div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelConfigButton" class="modal-button" type="button">Cancel</button>
        <button id="saveConfigButton" class="modal-button" type="button">Save</button>
      </div>
    </div>
  </div>

  <template id="folderFallbackTemplate">
    <div class="tile-fallback">
      <svg class="tile-folder-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2Z"/>
      </svg>
    </div>
  </template>

  <template id="fileFallbackTemplate">
    <div class="tile-fallback">
      <svg class="tile-file-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6Zm1 7V3.5L19.5 9H15Z"/>
      </svg>
    </div>
  </template>

  <script type="module">
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONFIG & CONSTANTS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const CONFIG = Object.freeze({
      DB_NAME: 'thumbnail-file-explorer-static',
      DB_VERSION: 1,
      DB_STORE: 'thumbs',
      RENDER_VERSION: 4,  // Bumped for new HTML/MD renderer
      PREVIEW_WIDTH: 320,
      PREVIEW_HEIGHT: 480,
      THUMB_QUEUE_CONCURRENCY: 2,
      TILE_MIN: 20,
      TILE_MAX: 180,
      TILE_STEP: 10,
      DEFAULT_TILE_WIDTH: 78,

    const ThumbnailRegistry = {

        exts.forEach(ext => this.builders.set(ext.toLowerCase(), builder));

    // FILE HANDLER REGISTRY (拡張性向上)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const FileHandlerRegistry = {
      handlers: new Map(),
      defaultHandler: null,

      register(extensions, handler) {
        const exts = Array.isArray(extensions) ? extensions : [extensions];
        exts.forEach(ext => this.handlers.set(ext.toLowerCase(), handler));
        return this;

      setDefault(handler) {

      getHandler(ext) {

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // DOM ELEMENTS (一括取得)

    const $ = id => document.getElementById(id);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // STATE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const state = {

      treeExpanded: new Set(),
