      drag: { active: false, pointerId: null, startX: 0, startY: 0, lastX: 0, lastY: 0, lastTime: 0, vx: 0, vy: 0, samples: [], raf: 0, moved: false, startedOnTile: false, suppressClickUntil: 0 },
    };

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // UTILITIES
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const createElement = (tag, className, text) => {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text != null) el.textContent = text;
      return el;
    };

    const getExtension = name => {
      const m = /\.[^.]+$/.exec(name.toLowerCase());
      return m ? m[0] : '';
    };

    const clampTileWidth = value => {
      const normalized = Math.round(value / CONFIG.TILE_STEP) * CONFIG.TILE_STEP;
      return Math.max(CONFIG.TILE_MIN, Math.min(CONFIG.TILE_MAX, normalized));
    };

    const canvasToBlob = (canvas, type = 'image/jpeg', quality = 0.88) =>
      new Promise((resolve, reject) => canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), type, quality));

    const drawCover = (ctx, src, sw, sh, dw, dh) => {
      const scale = Math.max(dw / sw, dh / sh);
      const w = sw * scale, h = sh * scale;
      ctx.drawImage(src, (dw - w) / 2, (dh - h) / 2, w, h);
    };

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // SETTINGS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function loadSettings() {
      try {
        const raw = localStorage.getItem('thumbnailExplorerSettings');
        const parsed = raw ? JSON.parse(raw) : {};
        const savedWidth = Number(parsed.tileWidth);
        // Use saved width if version matches, otherwise use default (78px = 100%)
        const tileWidth = parsed.settingsVersion === CONFIG.SETTINGS_VERSION
          ? clampTileWidth(savedWidth || CONFIG.DEFAULT_TILE_WIDTH)
          : CONFIG.DEFAULT_TILE_WIDTH;
        return {
          viewerMode: parsed.viewerMode === 'user' ? 'user' : 'default',
          viewerUrl: (typeof parsed.viewerUrl === 'string' && parsed.viewerUrl.trim()) ? parsed.viewerUrl : CONFIG.DEFAULT_VIEWER_URL,
          tileWidth,
          settingsVersion: CONFIG.SETTINGS_VERSION,
        };
      } catch {
        return { viewerMode: 'default', viewerUrl: CONFIG.DEFAULT_VIEWER_URL, tileWidth: CONFIG.DEFAULT_TILE_WIDTH, settingsVersion: CONFIG.SETTINGS_VERSION };
      }
    }

    function saveSettings() {
      state.settings.settingsVersion = CONFIG.SETTINGS_VERSION;
      localStorage.setItem('thumbnailExplorerSettings', JSON.stringify(state.settings));
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // INDEXEDDB CACHE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function openDatabase() {
      if (state.dbPromise) return state.dbPromise;
      state.dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(CONFIG.DB_STORE)) db.createObjectStore(CONFIG.DB_STORE, { keyPath: 'url' });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return state.dbPromise;
    }

    async function idbGet(url) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(CONFIG.DB_STORE, 'readonly');
        const req = tx.objectStore(CONFIG.DB_STORE).get(url);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbPut(record) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(CONFIG.DB_STORE, 'readwrite');
        tx.objectStore(CONFIG.DB_STORE).put(record);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // MEMORY THUMBNAIL CACHE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function getMemoryThumb(url) { return state.memoryThumbs.get(url); }

    function putMemoryThumb(url, signature, blob) {
      const existing = state.memoryThumbs.get(url);
      if (existing && existing.signature === signature) return existing.objectUrl;
      if (existing?.objectUrl) URL.revokeObjectURL(existing.objectUrl);
      const objectUrl = URL.createObjectURL(blob);
      state.memoryThumbs.set(url, { signature, blob, objectUrl });
      return objectUrl;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // PDF.js LOADER
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function loadPdfjs() {
      if (state.pdfjsPromise) return state.pdfjsPromise;
      state.pdfjsPromise = (async () => {
        const candidates = [
          { moduleUrl: CONFIG.PDFJS_LOCAL_MODULE, workerUrl: CONFIG.PDFJS_LOCAL_WORKER },
          { moduleUrl: CONFIG.PDFJS_CDN_MODULE, workerUrl: CONFIG.PDFJS_CDN_WORKER },
        ];
        let lastError = null;
        for (const c of candidates) {
          try {
            const mod = await import(c.moduleUrl);
            const lib = mod.default ?? mod;
            lib.GlobalWorkerOptions.workerSrc = c.workerUrl;
            return lib;
          } catch (e) { lastError = e; }
        }
        throw lastError || new Error('PDF.js failed to load');
      })();
      return state.pdfjsPromise;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HTML2CANVAS / MARKED LOADERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load: ${url}`));
        document.head.appendChild(script);
      });
    }

    async function loadHtml2Canvas() {
      if (state.html2canvasPromise) return state.html2canvasPromise;
      state.html2canvasPromise = (async () => {
        if (window.html2canvas) return window.html2canvas;
        await loadScript(CONFIG.HTML2CANVAS_CDN);
        if (!window.html2canvas) throw new Error('html2canvas not found');
        return window.html2canvas;
      })();
      return state.html2canvasPromise;
    }

    async function loadMarked() {
      if (state.markedPromise) return state.markedPromise;
      state.markedPromise = (async () => {
        if (window.marked) return window.marked;
        await loadScript(CONFIG.MARKED_CDN);
        if (!window.marked) throw new Error('marked not found');
        return window.marked;
      })();
      return state.markedPromise;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // THUMBNAIL BUILDERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function buildImageThumbnail(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Image fetch failed: ${res.status}`);
      const blob = await res.blob();
      const bitmap = await createImageBitmap(blob);
      const canvas = document.createElement('canvas');
      canvas.width = CONFIG.PREVIEW_WIDTH;
      canvas.height = CONFIG.PREVIEW_HEIGHT;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0f141b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawCover(ctx, bitmap, bitmap.width, bitmap.height, canvas.width, canvas.height);
      bitmap.close();
      return canvasToBlob(canvas);
    }

    async function buildPdfThumbnail(url) {
      const lib = await loadPdfjs();
      const task = lib.getDocument({ url, useWorkerFetch: true, isEvalSupported: false });
      const pdf = await task.promise;
      const page = await pdf.getPage(1);
      const vp = page.getViewport({ scale: 1 });
      const pad = 18;
      const scale = Math.min((CONFIG.PREVIEW_WIDTH - pad * 2) / vp.width, (CONFIG.PREVIEW_HEIGHT - pad * 2) / vp.height);
      const rvp = page.getViewport({ scale });
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = Math.ceil(rvp.width);
      pageCanvas.height = Math.ceil(rvp.height);
      await page.render({ canvasContext: pageCanvas.getContext('2d', { alpha: false }), viewport: rvp }).promise;

      const canvas = document.createElement('canvas');
      canvas.width = CONFIG.PREVIEW_WIDTH;
      canvas.height = CONFIG.PREVIEW_HEIGHT;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0d1218';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const dx = Math.round((canvas.width - pageCanvas.width) / 2);
      const dy = Math.round((canvas.height - pageCanvas.height) / 2);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.34)';
      ctx.shadowBlur = 18;
      ctx.shadowOffsetY = 8;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(dx, dy, pageCanvas.width, pageCanvas.height);
      ctx.restore();
      ctx.drawImage(pageCanvas, dx, dy);
      page.cleanup();
      pdf.destroy();
      return canvasToBlob(canvas);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HTML RENDERING THUMBNAIL (iframe + html2canvas)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function resolveUrls(html, baseUrl) {
      // Convert relative URLs to absolute URLs for images, links, etc.
      const base = new URL(baseUrl);
      return html
        .replace(/(src|href)=["'](?!https?:|data:|#)([^"']+)["']/gi, (m, attr, path) => {
          try {
            const absUrl = new URL(path, base).href;
            return `${attr}="${absUrl}"`;
          } catch { return m; }
        });
    }

    function createRenderStyles() {
      return `
        <style>
          * { box-sizing: border-box; }
          html, body {
            margin: 0; padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 11px; line-height: 1.5;
            background: #ffffff; color: #1a1a1a;
            width: ${CONFIG.PREVIEW_WIDTH}px;
            overflow: hidden;
          }
          img { max-width: 100%; height: auto; display: block; margin: 8px 0; }
          table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 9px; }
          th, td { border: 1px solid #ddd; padding: 4px 6px; text-align: left; }
          th { background: #f5f5f5; font-weight: 600; }
          h1 { font-size: 16px; margin: 0 0 8px; color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: 4px; }
          h2 { font-size: 14px; margin: 12px 0 6px; color: #1d4ed8; }
          h3 { font-size: 12px; margin: 10px 0 4px; color: #374151; }
          h4, h5, h6 { font-size: 11px; margin: 8px 0 4px; }
          p { margin: 0 0 8px; }
          ul, ol { margin: 4px 0; padding-left: 18px; }
          li { margin: 2px 0; }
          pre, code { background: #f3f4f6; border-radius: 3px; font-family: monospace; font-size: 9px; }
          pre { padding: 8px; overflow-x: auto; margin: 8px 0; }
          code { padding: 1px 4px; }
          blockquote { margin: 8px 0; padding: 6px 12px; border-left: 3px solid #2563eb; background: #f8fafc; }
          hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
          a { color: #2563eb; text-decoration: none; }
        </style>
      `;
    }

    async function renderHtmlToCanvas(htmlContent, baseUrl) {
      const html2canvas = await loadHtml2Canvas();

      // Create hidden container
      const container = document.createElement('div');
      container.style.cssText = `
        position: fixed; left: -9999px; top: 0;
        width: ${CONFIG.PREVIEW_WIDTH}px;
        height: ${CONFIG.PREVIEW_HEIGHT}px;
        overflow: hidden; background: #fff;
      `;

      // Create iframe for isolated rendering
      const iframe = document.createElement('iframe');
      iframe.style.cssText = `width: ${CONFIG.PREVIEW_WIDTH}px; height: ${CONFIG.PREVIEW_HEIGHT}px; border: none;`;
      container.appendChild(iframe);
      document.body.appendChild(container);

      try {
        // Resolve relative URLs and prepare HTML
        const resolvedHtml = resolveUrls(htmlContent, baseUrl);
        const fullHtml = `
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8">${createRenderStyles()}</head>
          <body>${resolvedHtml}</body></html>
        `;

        // Write to iframe
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(fullHtml);
        iframeDoc.close();

        // Wait for images to load
        await new Promise(resolve => {
          const images = iframeDoc.querySelectorAll('img');
          if (images.length === 0) { resolve(); return; }
          let loaded = 0;
          const checkDone = () => { if (++loaded >= images.length) resolve(); };
          images.forEach(img => {
            if (img.complete) checkDone();
            else { img.onload = img.onerror = checkDone; }
          });
          // Timeout fallback
          setTimeout(resolve, 3000);
        });

        // Small delay for rendering
        await new Promise(r => setTimeout(r, 100));

        // Capture with html2canvas
        const capturedCanvas = await html2canvas(iframeDoc.body, {
          width: CONFIG.PREVIEW_WIDTH,
          height: CONFIG.PREVIEW_HEIGHT,
          scale: 1,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false,
        });

        // Create final canvas with shadow effect
        const canvas = document.createElement('canvas');
        canvas.width = CONFIG.PREVIEW_WIDTH;
        canvas.height = CONFIG.PREVIEW_HEIGHT;
        const ctx = canvas.getContext('2d');

        // Background
        ctx.fillStyle = '#0d1218';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Add shadow and draw captured content
        const pad = 8;
        const contentW = canvas.width - pad * 2;
        const contentH = canvas.height - pad * 2;

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetY = 6;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(pad, pad, contentW, contentH);
        ctx.restore();

        ctx.drawImage(capturedCanvas, 0, 0, capturedCanvas.width, capturedCanvas.height, pad, pad, contentW, contentH);

        return canvas;
      } finally {
        document.body.removeChild(container);
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // FALLBACK TEXT PREVIEW (Canvas 2D)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function parseTextTokens(rawText, isMarkdown) {
      const tokens = [];
      for (const raw of rawText.split('\n')) {
        if (isMarkdown) {
          if (/^(\s*[-*_]){3,}\s*$/.test(raw)) { tokens.push({ hr: true }); continue; }
          const hm = raw.match(/^(#{1,6})\s+(.*)/);
          if (hm) { tokens.push({ text: hm[2].replace(/\*\*|__|\*|_|`/g, ''), heading: true, level: hm[1].length }); continue; }
          const bm = raw.match(/^(\s*)[-*+]\s+(.*)/);
          if (bm) { tokens.push({ text: bm[2].replace(/\*\*|__|\*|_|`/g, ''), bullet: true, indent: Math.floor(bm[1].length / 2) }); continue; }
          const nm = raw.match(/^(\s*)\d+\.\s+(.*)/);
          if (nm) { tokens.push({ text: nm[2].replace(/\*\*|__|\*|_|`/g, ''), bullet: true, indent: Math.floor(nm[1].length / 2) }); continue; }
          if (/^```/.test(raw)) { tokens.push({ code: true, text: '' }); continue; }
          if (!raw.trim()) { tokens.push({ blank: true }); continue; }
          tokens.push({ text: raw.replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1').replace(/`([^`]+)`/g, '$1').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') });
        } else {
          const stripped = raw.replace(/<br\s*\/?>/gi, '').replace(/<\/?(p|div|section|article|header|footer|main|nav|li|tr|td|th)[^>]*>/gi, '').replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&nbsp;/g, ' ').replace(/&#\d+;/g, '');
          if (!stripped.trim()) { tokens.push({ blank: true }); continue; }
          tokens.push({ text: stripped });
        }
      }
      return tokens;
    }

    function wrapText(ctx, text, maxWidth, maxLines) {
      const result = [];
      let remaining = text;
      while (remaining.length && result.length < maxLines) {
        let end = remaining.length;
        if (ctx.measureText(remaining).width > maxWidth) {
          let lo = 0, hi = remaining.length;
          while (lo < hi - 1) {
            const mid = (lo + hi) >> 1;
            ctx.measureText(remaining.slice(0, mid)).width <= maxWidth ? lo = mid : hi = mid;
          }
          end = lo;
          const sp = remaining.lastIndexOf(' ', end);
          if (sp > end * 0.4) end = sp + 1;
        }
        const chunk = remaining.slice(0, end).trimEnd();
        if (chunk) result.push(chunk);
        remaining = remaining.slice(end).trimStart();
        if (result.length === maxLines && remaining.length && result[maxLines - 1]) result[maxLines - 1] = result[maxLines - 1].slice(0, -1) + '…';
      }
      return result;
    }

    function drawTextPreview(canvas, tokens, title) {
      const W = canvas.width, H = canvas.height;
      const ctx = canvas.getContext('2d');
      const PAD = 14, LINE_H = 15, MAX_W = W - PAD * 2;

      ctx.fillStyle = '#1a2030';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#4BAAE5';
      ctx.fillRect(0, 0, W, 3);
      ctx.fillStyle = '#0d1520';
      ctx.fillRect(0, 3, W, 22);
      ctx.fillStyle = '#4BAAE5';
      ctx.font = 'bold 10px sans-serif';
      ctx.fillText(title.slice(0, 40), PAD, 18);

      let y = 34, inCode = false;
      for (const tok of tokens) {
        if (y + LINE_H > H - 8) break;
        if (tok.hr) { ctx.strokeStyle = '#3a4a5a'; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(PAD, y + 6); ctx.lineTo(W - PAD, y + 6); ctx.stroke(); y += 10; continue; }
        if (tok.blank) { y += LINE_H * 0.5; continue; }
        if (tok.code && !tok.text) { inCode = !inCode; if (inCode) { ctx.fillStyle = '#111c2a'; ctx.fillRect(PAD - 2, y, MAX_W + 4, LINE_H); } y += inCode ? 0 : 4; continue; }
        const text = tok.text || '';
        if (!text.trim()) { y += LINE_H * 0.4; continue; }

        if (inCode) {
          ctx.fillStyle = '#111c2a'; ctx.fillRect(PAD - 2, y - 11, MAX_W + 4, LINE_H + 2);
          ctx.fillStyle = '#7ec8a0'; ctx.font = '9px monospace';
          ctx.fillText(text.slice(0, 60), PAD + 4, y); y += LINE_H; continue;
        }
        if (tok.heading) {
          const sizes = [16, 14, 12, 11, 10, 10];
          const fs = sizes[Math.min(tok.level - 1, 5)];
          ctx.fillStyle = tok.level === 1 ? '#5bbcf0' : tok.level === 2 ? '#8ecfe8' : '#aadaee';
          if (tok.level === 1) y += 2;
          ctx.font = `bold ${fs}px sans-serif`;
          for (const hl of wrapText(ctx, text, MAX_W, 2)) {
            ctx.fillText(hl, PAD, y);
            if (tok.level <= 2) { ctx.strokeStyle = tok.level === 1 ? '#4BAAE5' : '#2d4a5a'; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(PAD, y + 3); ctx.lineTo(PAD + Math.min(ctx.measureText(hl).width + 8, MAX_W), y + 3); ctx.stroke(); y += 4; }
            y += LINE_H; if (y + LINE_H > H - 8) break;
          }
          continue;
        }
        if (tok.bullet) {
          const ix = PAD + (tok.indent || 0) * 10;
          ctx.fillStyle = '#4BAAE5'; ctx.font = '10px sans-serif';
          ctx.fillText('•', ix, y); ctx.fillStyle = '#c8d8e8';
          for (const bl of wrapText(ctx, text, MAX_W - 10 - (tok.indent || 0) * 10, 2)) {
            ctx.fillText(bl, ix + 10, y); y += LINE_H; if (y + LINE_H > H - 8) break;
          }
          continue;
        }
        ctx.fillStyle = '#c8d8e8'; ctx.font = '10px sans-serif';
        for (const l of wrapText(ctx, text, MAX_W, 2)) { ctx.fillText(l, PAD, y); y += LINE_H; if (y + LINE_H > H - 8) break; }
      }
    }

    async function buildTextFallbackThumbnail(text, title, isMarkdown) {
      const tokens = parseTextTokens(text, isMarkdown);
      const canvas = document.createElement('canvas');
      canvas.width = CONFIG.PREVIEW_WIDTH;
      canvas.height = CONFIG.PREVIEW_HEIGHT;
      drawTextPreview(canvas, tokens, title);
      return canvasToBlob(canvas, 'image/jpeg', 0.88);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // MARKDOWN THUMBNAIL
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function buildMarkdownThumbnail(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Markdown fetch failed: ${res.status}`);
      const mdText = await res.text();
      const fname = decodeURIComponent(url.split('/').pop() || '');

      try {
        // Try advanced rendering with marked + html2canvas
        const marked = await loadMarked();
        const htmlContent = marked.parse(mdText, { gfm: true, breaks: true });
        const canvas = await renderHtmlToCanvas(htmlContent, url);
        return canvasToBlob(canvas);
      } catch (e) {
        console.warn('Advanced MD render failed, using fallback:', e);
        return buildTextFallbackThumbnail(mdText, fname, true);
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HTML THUMBNAIL
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function buildHtmlThumbnail(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTML fetch failed: ${res.status}`);
      let rawHtml = await res.text();
      const fname = decodeURIComponent(url.split('/').pop() || '');

      try {
        // Extract body content, preserving styles
        let bodyContent = rawHtml;
        const bodyMatch = rawHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        if (bodyMatch) bodyContent = bodyMatch[1];

        // Extract and include inline styles
        const styleMatches = rawHtml.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [];
        const styles = styleMatches.join('\n');

        // Remove scripts for safety
        bodyContent = bodyContent.replace(/<script[\s\S]*?<\/script>/gi, '');

        const htmlWithStyles = styles + bodyContent;
        const canvas = await renderHtmlToCanvas(htmlWithStyles, url);
        return canvasToBlob(canvas);
      } catch (e) {
        console.warn('Advanced HTML render failed, using fallback:', e);
        // Fallback to text extraction
        rawHtml = rawHtml.replace(/<script[\s\S]*?<\/script>/gi, '').replace(/<style[\s\S]*?<\/style>/gi, '').replace(/<!--[\s\S]*?-->/g, '');
        const bodyMatch = rawHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        const body = bodyMatch ? bodyMatch[1] : rawHtml;
        const textContent = body.replace(/<\/?(h[1-6]|p|div|li|tr|br)[^>]*>/gi, '\n');
        return buildTextFallbackThumbnail(textContent, fname, false);
      }
    }

    // Register thumbnail builders
    ThumbnailRegistry
      .register(['.png', '.jpg', '.jpeg', '.gif', '.bmp', '.webp', '.avif'], buildImageThumbnail)
      .register('.pdf', buildPdfThumbnail)
      .register('.md', buildMarkdownThumbnail)
      .register(['.html', '.htm'], buildHtmlThumbnail);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // FILE HANDLERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function openWithUserViewer(fileUrl) {
      const template = state.settings.viewerUrl.trim() || CONFIG.DEFAULT_VIEWER_URL;
      const encoded = encodeURIComponent(fileUrl.href);
      const target = template.includes('{url}') ? template.replaceAll('{url}', encoded) : `${template}${template.includes('?') ? '&' : '?'}url=${encoded}`;
      window.open(new URL(target, window.location.href).href, '_blank', 'noopener');
    }

    function openDirectly(fileUrl) {
      window.open(fileUrl.href, '_blank', 'noopener');
    }

    function openFile(fileUrl, ext) {
      // User Viewer only applies to PDF files
      if (state.settings.viewerMode === 'user' && ext === '.pdf') {
        openWithUserViewer(fileUrl);
      } else {
        const handler = FileHandlerRegistry.getHandler(ext);
        handler(fileUrl, ext);
      }
    }

    // Register file handlers (デフォルトはダイレクトオープン)
    FileHandlerRegistry.setDefault(openDirectly);
    // 例: PDFは専用ビューワーで開く設定も可能
    // FileHandlerRegistry.register('.pdf', (url) => openWithUserViewer(url));

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // THUMBNAIL QUEUE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const isThumbable = item => !item.isDir && ThumbnailRegistry.canBuild(item.ext);

    function updateBrandCount() {
      if (!DOM.brandCount) return;
      const files = state.filteredItems.filter(item => !item.isDir);
      const total = files.length;
      const loaded = files.filter(item => !isThumbable(item) || state.previewReady.has(item.url.href)).length;
      if (total === 0 || loaded >= total) {
        DOM.brandCount.textContent = '';
        DOM.brandCount.style.display = 'none';
      } else {
        DOM.brandCount.style.display = '';
        DOM.brandCount.textContent = `${loaded}/${total}`;
      }
    }

    function setTilePreview(tile, sourceUrl) {
      const media = tile.querySelector('.tile-media');
      media.replaceChildren();
      const img = document.createElement('img');
      img.src = sourceUrl;
      img.alt = '';
      media.append(img);
      if (tile?.dataset?.url) {
        state.previewReady.add(tile.dataset.url);
        updateBrandCount();
      }
    }

    async function loadPreviewFromCache(item, tile) {
      const memory = getMemoryThumb(item.url.href);
      if (memory) { setTilePreview(tile, memory.objectUrl); return; }
      try {
        const record = await idbGet(item.url.href);
        if (record?.blob && state.visibleTileMap.get(item.url.href) === tile) {
          const objectUrl = putMemoryThumb(item.url.href, record.signature, record.blob);
          setTilePreview(tile, objectUrl);
        }
      } catch (e) { console.warn('Cache read failed:', e); }
    }

    async function probeFile(url) {
      let res = await fetch(url, { method: 'HEAD', cache: 'no-store' });
      if (!res.ok) res = await fetch(url, { method: 'GET', cache: 'no-store' });
      return { signature: `${res.headers.get('Last-Modified') || ''}|${res.headers.get('Content-Length') || ''}|${CONFIG.RENDER_VERSION}`, lastModified: res.headers.get('Last-Modified') || '', contentLength: res.headers.get('Content-Length') || '' };
    }

    async function ensureThumbnail(item) {
      const fetchUrl = item.downloadUrl || item.url.href;
      const meta = await probeFile(fetchUrl);
      const cached = await idbGet(item.url.href);
      if (cached?.blob && cached.signature === meta.signature) {
        const objectUrl = putMemoryThumb(item.url.href, cached.signature, cached.blob);
        const tile = state.visibleTileMap.get(item.url.href);
        if (tile) setTilePreview(tile, objectUrl);
        return;
      }

      const builder = ThumbnailRegistry.get(item.ext);
      if (!builder) return;

      const blob = await builder(fetchUrl);
      await idbPut({ url: item.url.href, blob, signature: meta.signature, lastModified: meta.lastModified, contentLength: meta.contentLength, updatedAt: Date.now() });
      const objectUrl = putMemoryThumb(item.url.href, meta.signature, blob);
      const tile = state.visibleTileMap.get(item.url.href);
      if (tile) setTilePreview(tile, objectUrl);
    }

    function pumpThumbnailQueue() {
      while (state.activeJobs < CONFIG.THUMB_QUEUE_CONCURRENCY && state.queue.length) {
        const item = state.queue.shift();
        state.activeJobs += 1;
        const run = async () => {
          try { await ensureThumbnail(item); }
          catch (e) { console.warn('Thumbnail build failed:', item.url.href, e); }
          finally { state.queueKeys.delete(item.url.href); state.activeJobs -= 1; pumpThumbnailQueue(); }
        };
        'requestIdleCallback' in window ? requestIdleCallback(() => run(), { timeout: 1200 }) : setTimeout(run, 24);
      }
    }

    function queueThumbnailBuild(item) {
      if (state.queueKeys.has(item.url.href)) return;
      state.queue.push(item);
      state.queueKeys.add(item.url.href);
      pumpThumbnailQueue();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // UI HELPERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function updateToolbarFade() {
      if (!DOM.toolbar || !DOM.toolbarWrap) return;
      const { scrollLeft, scrollWidth, clientWidth } = DOM.toolbar;
      DOM.toolbarWrap.classList.toggle('at-start', scrollLeft <= 2);
      DOM.toolbarWrap.classList.toggle('at-end', scrollLeft + clientWidth >= scrollWidth - 2);
    }

    function applyTileWidth() {
      document.documentElement.style.setProperty('--tile-width', `${state.settings.tileWidth}px`);
      if (DOM.zoomLabel) DOM.zoomLabel.textContent = `${Math.round((state.settings.tileWidth / CONFIG.DEFAULT_TILE_WIDTH) * 100)}%`;
    }

    function collapseSidebar(collapsed) {
      DOM.app.classList.toggle('sidebar-collapsed', collapsed);
      DOM.showSidebarButton.classList.toggle('hidden', !collapsed);
    }

    function setScrollMode(mode) {
      state.scrollMode = mode === 'vertical' ? 'vertical' : 'horizontal';
      DOM.grid.classList.remove('horizontal', 'vertical');
      DOM.grid.classList.add(state.scrollMode);
      DOM.scrollModeButton.classList.toggle('active', state.scrollMode === 'vertical');
      DOM.scrollModeIcon.innerHTML = state.scrollMode === 'horizontal'
        ? '<path d="M4 12h16"/><path d="m14 6 6 6-6 6"/><path d="m10 6-6 6 6 6"/>'
        : '<path d="M12 4v16"/><path d="m6 10 6-6 6 6"/><path d="m6 14 6 6 6-6"/>';
      DOM.scrollModeButton.title = state.scrollMode === 'horizontal' ? 'Switch to vertical scroll' : 'Switch to horizontal scroll';
      DOM.contentScroll.scrollTo({ left: 0, top: 0, behavior: 'instant' });
    }

    function toggleSort() {
      state.sortMode = state.sortMode === 'name' ? 'date' : 'name';
      const isDate = state.sortMode === 'date';
      DOM.sortButton.classList.toggle('sort-date', isDate);
      DOM.sortButton.title = isDate ? 'Sort: Date (newest first) — click for Name A→Z' : 'Sort: Name A→Z — click for Date';
      DOM.sortIcon.innerHTML = isDate
        ? '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'
        : '<path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/>';
      renderGrid(state.currentItems);
    }

    function updateUpButton() {
      if (!DOM.goUpButton) return;
      if (state.mode === 'github' && state.github) {
        DOM.goUpButton.disabled = state.github.path === '';
      } else {
        const parent = normalizeDirUrl(new URL('../', state.currentDirUrl));
        DOM.goUpButton.disabled = parent.href === state.currentDirUrl.href;
      }
    }

    function updateSourceBadge() {
      if (!DOM.sourceBadge) return;
      if (state.mode === 'github' && state.github) {
        const { owner, repo, branch, path } = state.github;
        DOM.sourceBadge.textContent = [owner, repo, branch, path].filter(Boolean).join('/');
        DOM.sourceBadge.classList.remove('hidden');
      } else {
        DOM.sourceBadge.textContent = '';
        DOM.sourceBadge.classList.add('hidden');
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // DIRECTORY PARSING
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function normalizeDirUrl(input) {
      const url = new URL(input, APP_ROOT_URL);
      if (!url.pathname.startsWith(APP_ROOT_PATH) || url.origin !== window.location.origin) return new URL(APP_ROOT_URL.href);
      if (!url.pathname.endsWith('/')) url.pathname += '/';
      url.search = ''; url.hash = '';
      return url;
    }

    function extractDateFromAnchor(anchor) {
      const MONTHS = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
      
      function parseDate(dateStr, timeStr) {
        // Try various formats
        // Format: YYYY-MM-DD
        let m = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (m) {
          const [hh, mm] = (timeStr || '00:00').split(':').map(Number);
          return new Date(+m[1], +m[2] - 1, +m[3], hh || 0, mm || 0).getTime();
        }
        // Format: DD-Mon-YYYY (e.g., 01-Jan-2024)
        m = dateStr.match(/(\d{1,2})-(\w{3})-(\d{4})/i);
        if (m) {
          const mon = MONTHS[m[2].toLowerCase()];
          if (mon !== undefined) {
            const [hh, mm] = (timeStr || '00:00').split(':').map(Number);
            return new Date(+m[3], mon, +m[1], hh || 0, mm || 0).getTime();
          }
        }
        // Format: Mon DD, YYYY or Mon DD YYYY
        m = dateStr.match(/(\w{3})\s+(\d{1,2}),?\s+(\d{4})/i);
        if (m) {
          const mon = MONTHS[m[1].toLowerCase()];
          if (mon !== undefined) {
            const [hh, mm] = (timeStr || '00:00').split(':').map(Number);
            return new Date(+m[3], mon, +m[2], hh || 0, mm || 0).getTime();
          }
        }
        return 0;
      }

      // Apache table format: look for date in sibling <td>
      const tr = anchor.closest('tr');
      if (tr) {
        for (const cell of tr.querySelectorAll('td')) {
          const text = cell.textContent.trim();
          // YYYY-MM-DD HH:MM or YYYY-MM-DD HH:MM:SS
          let m = text.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
          if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
          // DD-Mon-YYYY HH:MM
          m = text.match(/(\d{1,2}-\w{3}-\d{4})\s+(\d{2}:\d{2})/i);
          if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
          // Mon DD, YYYY HH:MM
          m = text.match(/(\w{3}\s+\d{1,2},?\s+\d{4})\s+(\d{1,2}:\d{2})/i);
          if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
        }
      }
      
      // Nginx/lighttpd pre format: text after the anchor (may have lots of whitespace)
      const pre = anchor.closest('pre');
      if (pre) {
        // Get all text content after this anchor until next anchor or end
        let text = '';
        let node = anchor.nextSibling;
        while (node && node.nodeName !== 'A') {
          if (node.nodeType === Node.TEXT_NODE) text += node.textContent;
          node = node.nextSibling;
        }
        // Normalize whitespace
        text = text.replace(/\s+/g, ' ').trim();
        
        // DD-Mon-YYYY HH:MM (Nginx style)
        let m = text.match(/(\d{1,2}-\w{3}-\d{4})\s+(\d{2}:\d{2})/i);
        if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
        // YYYY-MM-DD HH:MM
        m = text.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
        if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
      }
      
      // Also check next sibling directly (some servers put date right after)
      const nextText = anchor.nextSibling?.textContent || '';
      if (nextText) {
        const normalized = nextText.replace(/\s+/g, ' ').trim();
        let m = normalized.match(/(\d{1,2}-\w{3}-\d{4})\s+(\d{2}:\d{2})/i);
        if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
        m = normalized.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
        if (m) { const t = parseDate(m[1], m[2]); if (t) return t; }
      }
      
      return 0;
    }

    function parseDirectoryListing(html, dirUrl) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const anchors = [...doc.querySelectorAll('a')];
      const seen = new Set(), items = [];
      
      for (const anchor of anchors) {
        const href = anchor.getAttribute('href');
        if (!href || href.startsWith('?') || href.startsWith('#') || href === '../' || href === '/' || href === '..' || href === '.') continue;
        if (anchor.textContent.trim() === 'Parent Directory' || anchor.textContent.trim() === '..') continue;
        
        let absoluteUrl;
        try { absoluteUrl = new URL(href, dirUrl); } catch { continue; }
        
        // Must be same origin
        if (absoluteUrl.origin !== window.location.origin) continue;
        
        // Determine if directory - check href ending OR presence of trailing slash icon
        const isDir = href.endsWith('/') || anchor.classList.contains('icon-directory');
        
        // Get name from text content or href
        let rawName = anchor.textContent.trim() || href;
        rawName = decodeURIComponent(rawName).replace(/\/$/, '');
        
        if (!rawName || CONFIG.HIDDEN_NAMES.has(rawName.toLowerCase())) continue;
        if (seen.has(absoluteUrl.href)) continue;
        seen.add(absoluteUrl.href);
        
        items.push({ 
          name: rawName, 
          url: absoluteUrl, 
          isDir, 
          ext: isDir ? '' : getExtension(rawName), 
          date: extractDateFromAnchor(anchor) 
        });
      }
      return items;
    }

    async function fetchDirectoryListing(dirUrl) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
      
      try {
        const res = await fetch(dirUrl.href, { cache: 'no-store', signal: controller.signal });
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error(`Failed to load directory: ${res.status}`);
        const html = await res.text();
        const items = parseDirectoryListing(html, dirUrl);
        return items;
      } catch (e) {
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') throw new Error('Request timed out');
        throw e;
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // GITHUB
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function detectMode(urlStr) { try { return new URL(urlStr).hostname === 'github.com' ? 'github' : 'local'; } catch { return 'local'; } }

    function parseGitHubUrl(urlStr) {
      try {
        const u = new URL(urlStr);
        if (u.hostname !== 'github.com') return null;
        const parts = u.pathname.replace(/^\//, '').split('/').filter(Boolean);
        const [owner, repo] = parts;
        if (!owner || !repo) return null;
        let branch = '', path = '';
        if (parts[2] === 'tree' || parts[2] === 'blob') { branch = parts[3] || ''; path = parts.slice(4).join('/'); }
        return { owner, repo, branch, path };
      } catch { return null; }
    }

    function buildGitHubHtmlUrl(gh, subPath, isDir) {
      return `https://github.com/${gh.owner}/${gh.repo}/${isDir ? 'tree' : 'blob'}/${gh.branch}${subPath ? `/${subPath}` : ''}`;
    }

    async function fetchGitHubListing(gh) {
      const pathPart = gh.path ? `/${encodeURIComponent(gh.path).replace(/%2F/g, '/')}` : '';
      const ref = gh.branch ? `?ref=${encodeURIComponent(gh.branch)}` : '';
      const apiUrl = `${CONFIG.GITHUB_API}/repos/${gh.owner}/${gh.repo}/contents${pathPart}${ref}`;
      const res = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github+json' } });
      if (!res.ok) throw new Error(res.status === 403 ? 'GitHub API rate limit exceeded.' : res.status === 404 ? 'Repository or path not found.' : `GitHub API error: ${res.status}`);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('Expected a directory, got a file.');
      return data.map(item => {
        const isDir = item.type === 'dir';
        return { name: item.name, url: new URL(buildGitHubHtmlUrl(gh, item.path, isDir)), isDir, ext: isDir ? '' : getExtension(item.name), downloadUrl: item.download_url || null, date: 0 };
      });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // TREE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function createTreeNode(name, dirUrl) {
      const wrapper = createElement('div', 'tree-node');
      wrapper.dataset.url = dirUrl.href;
      const row = createElement('div', 'tree-row');
      const toggle = createElement('div', 'tree-toggle', '▸');
      const icon = createElement('div', null, '📁');
      const label = createElement('div', 'tree-name', name);
      const children = createElement('div', 'tree-children');
      row.append(toggle, icon, label);
      wrapper.append(row, children);
      state.treeNodeMap.set(dirUrl.href, { wrapper, row, toggle, children, loaded: false });
      row.addEventListener('click', e => { e.stopPropagation(); navigateTo(dirUrl, { updateTree: true }); });
      toggle.addEventListener('click', e => { e.stopPropagation(); toggleTreeNode(dirUrl.href); });
      return wrapper;
    }

    async function ensureTreeChildren(dirUrl) {
      if (state.treeLoaded.has(dirUrl.href)) return;
      const node = state.treeNodeMap.get(dirUrl.href);
      if (!node) return;
      node.children.replaceChildren(createElement('div', 'note', 'Loading...'));
      try {
        const items = await fetchDirectoryListing(dirUrl);
        const dirs = items.filter(i => i.isDir);
        state.treeChildrenCache.set(dirUrl.href, dirs);
        node.children.replaceChildren();
        for (const dir of dirs) {
          if (!state.treeNodeMap.has(dir.url.href)) node.children.append(createTreeNode(dir.name, dir.url));
          else node.children.append(state.treeNodeMap.get(dir.url.href).wrapper);
        }
        node.toggle.textContent = dirs.length ? '▸' : '•';
      } catch { node.children.replaceChildren(createElement('div', 'note', 'Failed to read folder tree.')); node.toggle.textContent = '•'; }
      state.treeLoaded.add(dirUrl.href);
    }

    async function toggleTreeNode(urlHref, forceOpen = null) {
      const node = state.treeNodeMap.get(urlHref);
      if (!node) return;
      await ensureTreeChildren(new URL(urlHref));
      if (node.toggle.textContent === '•') return;
      const shouldOpen = forceOpen == null ? !node.children.classList.contains('open') : forceOpen;
      node.children.classList.toggle('open', shouldOpen);
      node.toggle.textContent = shouldOpen ? '▾' : '▸';
      shouldOpen ? state.treeExpanded.add(urlHref) : state.treeExpanded.delete(urlHref);
    }

    async function ensureTreePath(dirUrl) {
      // Build path segments from root to target
      const rootPath = decodeURIComponent(APP_ROOT_PATH);
      const targetPath = decodeURIComponent(dirUrl.pathname);
      const relative = targetPath.slice(rootPath.length).replace(/\/$/, '');
      const segments = relative ? relative.split('/').filter(Boolean) : [];
      
      // Start from root
      let currentUrl = new URL(APP_ROOT_URL.href);
      
      // Traverse each segment, loading and expanding each level
      for (let i = 0; i < segments.length; i++) {
        // Load children of current directory
        await ensureTreeChildren(currentUrl);
        // Expand this node
        await toggleTreeNode(currentUrl.href, true);
        
        // Find the matching child URL from cache
        const cached = state.treeChildrenCache.get(currentUrl.href);
        if (cached) {
          const matchingDir = cached.find(d => d.name === segments[i]);
          if (matchingDir) {
            currentUrl = matchingDir.url;
          } else {
            // Fallback: construct URL manually
            currentUrl = new URL(encodeURIComponent(segments[i]) + '/', currentUrl);
          }
        } else {
          // Fallback: construct URL manually
          currentUrl = new URL(encodeURIComponent(segments[i]) + '/', currentUrl);
        }
      }
      
      // Finally, load and expand the target directory itself
      await ensureTreeChildren(dirUrl);
      await toggleTreeNode(dirUrl.href, true);
    }
    
    // Recursively load and expand all subfolders in the tree
    async function expandAllTreeChildren(dirUrl, maxDepth = 20) {
      if (maxDepth <= 0) return;
      
      await ensureTreeChildren(dirUrl);
      await toggleTreeNode(dirUrl.href, true);
      
      const cached = state.treeChildrenCache.get(dirUrl.href);
      if (!cached || cached.length === 0) return;
      
      for (const dir of cached) {
        await expandAllTreeChildren(dir.url, maxDepth - 1);
      }
    }

    function renderTreeHighlight() {
      for (const [href, node] of state.treeNodeMap.entries()) node.row.classList.toggle('active', href === state.currentDirUrl.href);
    }

    function initTree() {
      DOM.treeRoot.replaceChildren();
      state.treeNodeMap.clear();
      state.treeChildrenCache.clear();
      state.treeExpanded.clear();
      state.treeLoaded.clear();
      DOM.treeRoot.append(createTreeNode(ROOT_LABEL, APP_ROOT_URL));
      renderTreeHighlight();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // GRID
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function sortedItems(items) {
      return [...items].sort((a, b) => {
        // Directories first
        if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
        if (state.sortMode === 'date') {
          const da = a.date || 0, db = b.date || 0;
          // Sort by date descending (newest first), ignore extension
          if (da !== db) return db - da;
          // Same date or no date info: reverse name (Z to A) to show visible change
          return b.name.localeCompare(a.name, undefined, { numeric: true, sensitivity: 'base' });
        }
        // Name sort ascending (A to Z)
        return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
      });
    }

    function applyFilter(items) {
      const keyword = state.filterText.trim().toLowerCase();
      return keyword ? items.filter(i => i.name.toLowerCase().includes(keyword)) : items;
    }

    function buildTile(item) {
      const tile = createElement('article', 'tile');
      tile.dataset.url = item.url.href;
      tile.dataset.name = item.name.toLowerCase();

      const media = createElement('div', 'tile-media');
      media.append((item.isDir ? DOM.folderTemplate : DOM.fileTemplate).content.firstElementChild.cloneNode(true));

      const overlay = createElement('div', 'tile-name-overlay');
      overlay.append(createElement('div', 'tile-name', item.name));

      tile.append(media, overlay);

      const activate = () => item.isDir ? navigateTo(item.url) : openFile(item.url, item.ext);

      tile.addEventListener('pointerup', e => {
        if (e.button !== 0) return;
        const d = state.drag;
        if (d.startedOnTile && !d.moved && Math.hypot(e.clientX - d.startX, e.clientY - d.startY) < 6) {
          e.preventDefault(); e.stopPropagation();
          d.suppressClickUntil = performance.now() + 180;
          activate();
        }
      });
      tile.addEventListener('click', e => { if (performance.now() < state.drag.suppressClickUntil) { e.preventDefault(); e.stopPropagation(); return; } activate(); });
      return tile;
    }

    function renderGrid(items) {
      const sorted = sortedItems(items);
      const filtered = applyFilter(sorted);
      state.filteredItems = filtered;
      DOM.grid.replaceChildren();
      state.visibleTileMap.clear();

      if (!filtered.length) { updateBrandCount(); DOM.grid.append(createElement('div', 'empty', state.filterText ? 'No items match the current filter.' : 'This folder is empty.')); return; }

      for (const item of filtered) {
        const tile = buildTile(item);
        DOM.grid.append(tile);
        state.visibleTileMap.set(item.url.href, tile);
        if (isThumbable(item)) { loadPreviewFromCache(item, tile); queueThumbnailBuild(item); }
      }
      updateBrandCount();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // NAVIGATION
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function pushUrlState(targetHref) {
      try {
        const params = new URLSearchParams(window.location.search);
        params.set('url', targetHref);
        history.replaceState(null, '', `${window.location.pathname}?${params.toString()}`);
      } catch { /* file:// */ }
    }

    async function navigateTo(targetUrl, options = {}) {
      const targetHref = typeof targetUrl === 'string' ? targetUrl : targetUrl.href;
      const mode = detectMode(targetHref);

      if (mode === 'github') {
        const gh = parseGitHubUrl(targetHref);
        if (!gh) { DOM.grid.replaceChildren(createElement('div', 'empty', 'Invalid GitHub URL.')); return; }
        if (!gh.branch) gh.branch = 'main';
        let items;
        try { items = await fetchGitHubListing(gh); }
        catch (e) { DOM.grid.replaceChildren(createElement('div', 'empty', e.message)); return; }
        state.mode = 'github';
        state.github = gh;
        state.currentDirUrl = new URL(buildGitHubHtmlUrl(gh, gh.path, true));
        state.currentItems = items;
        pushUrlState(buildGitHubHtmlUrl(gh, gh.path, true));
        updateSourceBadge();
        renderGrid(items);
        updateUpButton();
        collapseSidebar(true);
      } else {
        const dirUrl = normalizeDirUrl(targetUrl);
        const items = await fetchDirectoryListing(dirUrl);
        state.mode = 'local';
        state.github = null;
        state.currentDirUrl = dirUrl;
        state.currentItems = items;
        pushUrlState(dirUrl.href);
        updateSourceBadge();
        renderGrid(items);
        updateUpButton();
        if (options.updateTree !== false) {
          await ensureTreePath(dirUrl);
          renderTreeHighlight();
        }
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // DRAG & SCROLL
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function cancelInertia() { if (state.drag.raf) cancelAnimationFrame(state.drag.raf); state.drag.raf = 0; }

    function startInertia() {
      cancelInertia();
      const d = state.drag;
      if (d.samples.length) { d.vx = d.samples.reduce((s, v) => s + v.vx, 0) / d.samples.length; d.vy = d.samples.reduce((s, v) => s + v.vy, 0) / d.samples.length; }
      const friction = 0.94, minV = 0.02;
      const step = () => {
        if (state.scrollMode === 'horizontal') { DOM.contentScroll.scrollLeft -= d.vx * 16; d.vx *= friction; if (Math.abs(d.vx) > minV) d.raf = requestAnimationFrame(step); else d.raf = 0; }
        else { DOM.contentScroll.scrollTop -= d.vy * 16; d.vy *= friction; if (Math.abs(d.vy) > minV) d.raf = requestAnimationFrame(step); else d.raf = 0; }
      };
      d.raf = requestAnimationFrame(step);
    }

    function onPointerDown(e) {
      if (e.button !== 0 || e.target.closest('button, input, select, .modal, .crumb, .tree-row')) return;
      cancelInertia();
      Object.assign(state.drag, { active: true, pointerId: e.pointerId, startX: e.clientX, startY: e.clientY, lastX: e.clientX, lastY: e.clientY, lastTime: performance.now(), samples: [], vx: 0, vy: 0, moved: false, startedOnTile: !!e.target.closest('.tile'), suppressClickUntil: 0 });
    }

    function onPointerMove(e) {
      const d = state.drag;
      if (!d.active || d.pointerId !== e.pointerId) return;
      const now = performance.now(), dt = Math.max(1, now - d.lastTime);
      const dx = e.clientX - d.lastX, dy = e.clientY - d.lastY;
      const totalDx = e.clientX - d.startX, totalDy = e.clientY - d.startY;
      if (!d.moved && Math.hypot(totalDx, totalDy) >= 8) { d.moved = true; DOM.contentScroll.classList.add('dragging'); DOM.contentScroll.setPointerCapture?.(e.pointerId); }
      if (!d.moved) { d.lastX = e.clientX; d.lastY = e.clientY; d.lastTime = now; return; }
      e.preventDefault();
      if (state.scrollMode === 'horizontal') DOM.contentScroll.scrollLeft -= dx; else DOM.contentScroll.scrollTop -= dy;
      d.vx = dx / dt; d.vy = dy / dt;
      d.samples.push({ vx: d.vx, vy: d.vy, t: now }); if (d.samples.length > 6) d.samples.shift();
      d.lastX = e.clientX; d.lastY = e.clientY; d.lastTime = now;
    }

    function endPointerDrag(e) {
      const d = state.drag;
      if (!d.active || (e && d.pointerId !== e.pointerId)) return;
      const moved = d.moved;
      d.active = false; d.pointerId = null; d.suppressClickUntil = moved ? performance.now() + 180 : 0;
      DOM.contentScroll.classList.remove('dragging');
      if (moved) startInertia(); else { d.vx = 0; d.vy = 0; }
      d.moved = false; d.startedOnTile = false;
    }

    function handleWheelScroll(e) {
      if (e.ctrlKey || e.target.closest('input, textarea, select, .modal')) return;
      e.preventDefault();
      cancelInertia();
      if (state.scrollMode === 'horizontal') { DOM.contentScroll.scrollLeft += Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX; }
      else { DOM.contentScroll.scrollTop += e.deltaY; }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONFIG MODAL
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function openConfigModal() {
      DOM.viewerUrlInput.value = state.settings.viewerUrl || CONFIG.DEFAULT_VIEWER_URL;
      DOM.viewerDefaultButton.classList.toggle('active', state.settings.viewerMode === 'default');
      DOM.viewerUserButton.classList.toggle('active', state.settings.viewerMode === 'user');
      DOM.configModal.classList.add('open');
      DOM.configModal.setAttribute('aria-hidden', 'false');
    }

    function closeConfigModal() {
      DOM.configModal.classList.remove('open');
      DOM.configModal.setAttribute('aria-hidden', 'true');
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // EVENT LISTENERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    document.addEventListener('selectstart', e => { if (!e.target.closest('input, textarea')) e.preventDefault(); });
    document.addEventListener('dragstart', e => { if (!e.target.closest('input, textarea')) e.preventDefault(); });

    DOM.collapseSidebarButton.addEventListener('click', () => collapseSidebar(true));
    DOM.showSidebarButton.addEventListener('click', () => collapseSidebar(false));
    DOM.goUpButton.addEventListener('click', () => {
      if (state.mode === 'github' && state.github) {
        const parts = state.github.path.split('/').filter(Boolean); parts.pop();
        navigateTo(buildGitHubHtmlUrl(state.github, parts.join('/'), true), { updateTree: false });
      } else {
        const parent = normalizeDirUrl(new URL('../', state.currentDirUrl));
        if (parent.href !== state.currentDirUrl.href) navigateTo(parent, { updateTree: true });
      }
    });
    DOM.sortButton.addEventListener('click', toggleSort);
    DOM.searchInput.addEventListener('input', () => { state.filterText = DOM.searchInput.value || ''; renderGrid(state.currentItems); });
    DOM.zoomOutButton.addEventListener('click', () => { state.settings.tileWidth = clampTileWidth(state.settings.tileWidth - CONFIG.TILE_STEP); applyTileWidth(); saveSettings(); });
    DOM.zoomInButton.addEventListener('click', () => { state.settings.tileWidth = clampTileWidth(state.settings.tileWidth + CONFIG.TILE_STEP); applyTileWidth(); saveSettings(); });
    DOM.scrollModeButton.addEventListener('click', () => setScrollMode(state.scrollMode === 'horizontal' ? 'vertical' : 'horizontal'));
    DOM.fullscreenButton.addEventListener('click', () => { !document.fullscreenElement ? document.documentElement.requestFullscreen?.() : document.exitFullscreen?.(); });
    document.addEventListener('fullscreenchange', () => DOM.fullscreenButton.classList.toggle('active', !!document.fullscreenElement));
    DOM.configButton.addEventListener('click', openConfigModal);
    DOM.closeConfigButton.addEventListener('click', closeConfigModal);
    DOM.cancelConfigButton.addEventListener('click', closeConfigModal);
    DOM.viewerDefaultButton.addEventListener('click', () => { DOM.viewerDefaultButton.classList.add('active'); DOM.viewerUserButton.classList.remove('active'); });
    DOM.viewerUserButton.addEventListener('click', () => { DOM.viewerUserButton.classList.add('active'); DOM.viewerDefaultButton.classList.remove('active'); });
    DOM.saveConfigButton.addEventListener('click', () => { state.settings.viewerMode = DOM.viewerUserButton.classList.contains('active') ? 'user' : 'default'; state.settings.viewerUrl = DOM.viewerUrlInput.value.trim() || CONFIG.DEFAULT_VIEWER_URL; saveSettings(); closeConfigModal(); });
    DOM.configModal.addEventListener('click', e => { if (e.target === DOM.configModal) closeConfigModal(); });

    // Toolbar drag
    if (DOM.toolbar) {
      let drag = { on: false, x: 0, sl: 0, moved: false };
      DOM.toolbar.addEventListener('mousedown', e => { if (e.button !== 0 || e.target.closest('input, select')) return; drag = { on: true, moved: false, x: e.clientX, sl: DOM.toolbar.scrollLeft }; e.preventDefault(); });
      document.addEventListener('mousemove', e => { if (!drag.on) return; const dx = e.clientX - drag.x; if (!drag.moved && Math.abs(dx) > 4) { drag.moved = true; DOM.toolbar.classList.add('dragging'); } if (drag.moved) DOM.toolbar.scrollLeft = drag.sl - dx; });
      document.addEventListener('mouseup', () => { if (!drag.on) return; drag.on = false; DOM.toolbar.classList.remove('dragging'); updateToolbarFade(); });
      DOM.toolbar.addEventListener('click', e => { if (drag.moved) { e.stopImmediatePropagation(); drag.moved = false; } }, true);
      DOM.toolbar.addEventListener('wheel', e => { if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return; e.preventDefault(); DOM.toolbar.scrollLeft += e.deltaY; updateToolbarFade(); }, { passive: false });
      DOM.toolbar.addEventListener('scroll', updateToolbarFade, { passive: true });
    }

    DOM.contentScroll.addEventListener('wheel', handleWheelScroll, { passive: false });
    DOM.contentScroll.addEventListener('pointerdown', onPointerDown);
    DOM.contentScroll.addEventListener('pointermove', onPointerMove);
    DOM.contentScroll.addEventListener('pointerup', endPointerDrag);
    DOM.contentScroll.addEventListener('pointercancel', endPointerDrag);
    DOM.contentScroll.addEventListener('pointerleave', e => { if (state.drag.active && e.buttons === 0) endPointerDrag(e); });

    window.addEventListener('beforeunload', () => { cancelInertia(); updateBrandCount(); for (const entry of state.memoryThumbs.values()) if (entry.objectUrl) URL.revokeObjectURL(entry.objectUrl); });
    window.addEventListener('resize', updateToolbarFade);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // INIT
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    applyTileWidth();
    updateToolbarFade();
    setScrollMode('horizontal');
    initTree();
    collapseSidebar(true);

    const startUrlParam = new URLSearchParams(window.location.search).get('url');
    const startTarget = startUrlParam || APP_ROOT_URL.href;
    navigateTo(startTarget, { updateTree: !startUrlParam || detectMode(startTarget) !== 'github' }).catch(e => {
      console.error(e);
      DOM.grid.replaceChildren(createElement('div', 'empty', `Startup failed: ${e.message}`));
    });
  </script>
</body>
</html>
